---
# This is an example .goreleaser.yml file with some sane defaults.
# Make sure to check the documentation at http://goreleaser.com
project_name: termux-qemu-docker
version: 2
before:
  hooks:
    - go vet ./...
    - go test -v -race ./...
    # You may remove this if you don't use go modules.
    - go mod tidy
    # you may remove this if you don't need go generate
    - go generate ./...
builds:
  - id: termux-qemu-docker
    env:
      - CGO_ENABLED=0
    ldflags: -s -w -extldflags "-static"
    flags:
      - -trimpath
    goos:
      - android
    goarch:
      - amd64
      - arm64

nfpms:
  - id: termux-qemu-docker
    package_name: termux-qemu-docker
    ids:
      - termux-qemu-docker
    maintainer: Luis Davim <luisdavim@users.noreply.github.com>
    description: A lightweight profile-aware container VM manager for Termux
    homepage: https://github.com/luisdavim/termux-qemu-docker
    license: MIT
    formats:
      - termux.deb
    dependencies:
      - qemu-utils
      - openssh
      - libisoburn
      - dosfstools
      - 'qemu-system-{{ if eq .Arch "amd64" }}x86_64{{ else if eq .Arch "arm64" }}aarch64{{ else }}{{ .Arch }}{{ end }}-headless'

archives:
  - name_template: >-
      {{ .ProjectName }}_
      {{- if eq .Os "Darwin" }}macos_
      {{- else }}{{- tolower .Os }}_{{end}}
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
brews:
  - name: termux-qemu-docker
    repository:
      owner: luisdavim
      name: termux-qemu-docker
      branch: main
    directory: Formula
    description: "Watch a command and generate diffs from the output changes"
    homepage: "https://github.com/luisdavim/termux-qemu-docker"
    license: "MIT"
    download_strategy: CurlDownloadStrategy
    install: |
      bin.install "termux-qemu-docker"
    test: |
      system "#{bin}/termux-qemu-docker", "-h"
checksum:
  name_template: "checksums.txt"
snapshot:
  version_template: "{{ incpatch .Version }}-next"
changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
